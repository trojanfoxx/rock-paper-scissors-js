<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper and Scissors</title>

    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <h1 class="title-game">ROCK PAPER SCISSORS</h1>

    <div class="choices">
      <button class="button-choice">✊</button>
      <button class="button-choice">✋</button>
      <button class="button-choice">✌️</button>
    </div>

    <hr />

    <div class="result-card">
      <p class="result-title">Tie!</p>
      <img class="result-image" src="" alt="" />
    </div>

    <div class="choices-screen">
      <div class="choices-screen-profile">
        <h3>You</h3>
        <img src="" alt="player picture" />
        <p class="player-choice"></p>
      </div>

      <div class="choices-screen-profile">
        <h3>Computer</h3>
        <img src="" alt="computer picture" />
        <p class="computer-choice"></p>
      </div>
    </div>

    <div class="score-screen">
      <p>Win: <span class="win-count"></span></p>
      <p>Losses: <span class="lose-count"></span></p>
      <p>Ties: <span class="tie-count"></span></p>
    </div>

    <!-- TODO: Configurar botão para aparecer após primeiro número do score aparecer -->
    <button class="reset-button">Reset</button>
    <script src="./script.js"></script>
  </body>
</html>
